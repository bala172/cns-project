<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Cryptography Lab Simulator</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }

    .blob1 {
      width: 400px;
      height: 400px;
      background: rgba(0, 200, 255, 0.06);
      top: -100px;
      left: -100px;
    }

    .blob2 {
      width: 350px;
      height: 350px;
      background: rgba(168, 85, 247, 0.06);
      bottom: -80px;
      right: -80px;
      animation-delay: -4s;
    }

    @keyframes blobFloat {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(30px, 20px) scale(1.05);
      }
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 20px rgba(0, 200, 255, 0.6));
    }

    .login-logo h1 {
      font-size: 1.3rem;
      line-height: 1.2;
      color: var(--accent-1);
    }

    .login-logo p {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-top: 0.3rem;
      letter-spacing: 0.08em;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
    }

    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .tab {
      flex: 1;
      padding: 0.55rem;
      text-align: center;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: all 0.2s;
    }

    .tab.active {
      background: rgba(0, 200, 255, 0.12);
      color: var(--accent-1);
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon-wrap .icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 1rem;
      pointer-events: none;
    }

    .input-icon-wrap .form-control {
      padding-left: 2.5rem;
    }

    .password-wrap {
      position: relative;
    }

    .toggle-pw {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 1rem;
      padding: 0.2rem;
    }

    .toggle-pw:hover {
      color: var(--accent-1);
    }

    .demo-hint {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    .demo-hint span {
      color: var(--accent-2);
    }

    #errorMsg {
      display: none;
    }

    #successMsg {
      display: none;
    }
  </style>
</head>

<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <div class="login-wrapper fade-up">
    <div class="login-logo">
      <span class="logo-icon">🔐</span>
      <h1>CRYPTOGRAPHY<br>LAB SIMULATOR</h1>
      <p>// CNS Laboratory Experiments //</p>
    </div>

    <div class="login-card">
      <div class="tab-row">
        <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab" id="registerTab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="errorMsg" class="alert alert-error"></div>
      <div id="successMsg" class="alert alert-success"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-icon-wrap">
            <span class="icon">👤</span>
            <input type="text" id="loginUser" class="form-control" placeholder="Enter username"
              autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap password-wrap">
            <span class="icon">🔑</span>
            <input type="password" id="loginPass" class="form-control" placeholder="Enter password"
              autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePw('loginPass', this)">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <span id="loginBtnText">ACCESS LAB</span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-icon-wrap">
            <span class="icon">👤</span>
            <input type="text" id="regUser" class="form-control" placeholder="Choose a username" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap password-wrap">
            <span class="icon">🔑</span>
            <input type="password" id="regPass" class="form-control" placeholder="Create a password" />
            <button type="button" class="toggle-pw" onclick="togglePw('regPass', this)">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-success btn-full">CREATE ACCOUNT</button>
      </form>

      <!-- <div class="demo-hint">
        Demo: <span>admin</span> / <span>password123</span>
      </div> -->
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('clab_token')) window.location.href = '/dashboard';

    function switchTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
      clearMessages();
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '⚠ ' + msg; el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = '✓ ' + msg; el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }
    function clearMessages() {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'none';
    }

    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      if (!username || !password) return showError('Please fill in all fields.');

      const btn = document.getElementById('loginBtnText');
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Login failed'); btn.textContent = 'ACCESS LAB'; return; }

        localStorage.setItem('clab_token', data.token);
        localStorage.setItem('clab_user', data.username);
        window.location.href = '/dashboard';
      } catch {
        showError('Server error. Is the backend running?');
        btn.textContent = 'ACCESS LAB';
      }
    });

    // Register
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUser').value.trim();
      const password = document.getElementById('regPass').value;
      if (!username || !password) return showError('Please fill in all fields.');
      if (password.length < 6) return showError('Password must be at least 6 characters.');

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) return showError(data.error || 'Registration failed');
        showSuccess('Account created! You can now log in.');
        switchTab('login');
      } catch {
        showError('Server error. Is the backend running?');
      }
    });
  </script>
</body>

</html>
